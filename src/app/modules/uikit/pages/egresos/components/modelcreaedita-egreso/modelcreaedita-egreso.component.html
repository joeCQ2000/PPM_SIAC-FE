<div class="p-8">
  <div class="flex justify-between px-2 py-4 items-center mb-6 border-b  border-[#1A1A1A]/70">
    <h1 class="text-2xl font-semibold text-blue-600 flex items-center gap-2">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    {{ tituloModal }}
    </h1>
    <button (click)="cerrar()" class="text-gray-400 hover:text-gray-600">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="egresoFrom" class="space-y-6">
    <div class="grid grid-cols-2 gap-4">
      <!--Per-->
       <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo/Documento</label>
       <select formControlName="tipo_documento" 
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        <option value="" disabled selected>Seleccione un tipo</option>
        <option *ngFor="let tipo of tiposDocumento" [value]="tipo.valor">
          {{ tipo.etiqueta }}
        </option>
      </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
      <!--Responsable-->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Numero</label>
        <input type="text" formControlName="numero" 
               placeholder="Nombre del responsable"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Recurso</label>
        <input type="text" formControlName="recurso" 
               placeholder="Nombre del responsable"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="grid grid-cols-2 gap-4">
        <!--F.Emision-->  
        <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Emision</label>
        <input type="date" formControlName="fecha_emision" 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <!--F.Vencimiento-->  
        <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Vencimiento (Opcional)</label>
        <input type="date" formControlName="fecha_vencimiento" 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      </div>
       <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Moneda</label>
       <select formControlName="moneda" 
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        <option value="" disabled selected>Seleccione un tipo</option>
        <option *ngFor="let tipo of tipoMoneda" [value]="tipo.valor">
          {{ tipo.etiqueta }}
        </option>
      </select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="grid grid-cols-2 gap-4"> 
      <!--Estado-->  
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tasa_cambio</label>
        <input type="number" formControlName="tasa_cambio" 
               placeholder="Indique la tasa de cambio"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
        <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Proyecto</label>
        <input type="number" formControlName="id_proyecto" 
               placeholder="Nombre del Proyecto"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
        </div>
    <!--Valor de Venta-->  
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Valor de Venta</label>
         <input type="text" formControlName="valor_venta" 
               placeholder="Indique el servicio"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 py-3 items-center mb-3 border-b  border-[#1A1A1A]/70">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Línea</label>
        <input type="text" formControlName="linea" 
               placeholder="Indique la línea"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Observación (Opcional)</label>
      <input  type="text" formControlName ="observacion"
                placeholder="Indique alguna observación del Egreso"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    <div class="flex justify-end gap-3 pt-4">
      <button type="button" (click)="cerrar()" 
              class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
        Cancelar
      </button>
      <button type="button" (click)="registrar()" 
              [disabled]="!egresoFrom.valid"
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300">
        Registrar
      </button>
    </div>
  </form>
</div>

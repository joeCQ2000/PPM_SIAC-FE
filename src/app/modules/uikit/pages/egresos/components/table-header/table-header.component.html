<tr class="border-muted/20 border-b text-xs text-muted-foreground uppercase tracking-wider">
  <th class="py-3 px-4 text-left w-12">
    <input 
      type="checkbox" 
      [checked]="allSelected"
      [indeterminate]="someSelected && !allSelected"
      (change)="onHeaderCheck($event)"
      class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded 
             focus:ring-blue-500 focus:ring-2 cursor-pointer">
  </th>
  
  <th class="py-3 px-1 text-left">Tipo Documento</th>
  <th class="py-3 px-25 text-left">Fecha_Emisión</th>
  <th class="py-3 px-18 text-left">Moneda</th>
  <th class="py-3 px-22 text-left">Valor_Venta</th>
  <th class="py-3 px-23 text-left">Observación</th>
  <th class="py-3 px-40 text-flex">Acciones</th>
</tr>

<div class="p-8">
  <div class="flex justify-between px-2 py-4 items-center mb-6 border-b  border-[#1A1A1A]/70">
    <h1 class="text-2xl font-semibold text-blue-600 flex items-center gap-2">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    {{ tituloModal }}
    </h1>
    <button (click)="cerrar()" class="text-gray-400 hover:text-gray-600">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="ingresoForm" class="space-y-6">
    <div class="grid grid-cols-2 gap-4">
      <!--Tipo/Documento-->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo/Documento</label>
       <select formControlName="tipo_documento" 
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
  <option value="" disabled selected>Seleccione un tipo</option>
  <option *ngFor="let tipo of tiposDocumento" [value]="tipo.valor">
    {{ tipo.etiqueta }}
  </option>
</select>
      </div>
      <div class="grid grid-cols-2 gap-4">
      <!--Moneda-->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Moneda</label>
       <select formControlName="moneda" 
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        <option value="" disabled selected>Seleccione un tipo</option>
        <option *ngFor="let tipo of tipoMoneda" [value]="tipo.valor">
          {{ tipo.etiqueta }}
        </option>
      </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tasa Cambio</label>
        <input type="number" formControlName="tasa_cambio" 
               placeholder="Seleccione la tasa de conversion"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      </div>
    </div>

   <div class="grid grid-cols-2 gap-4">
  <!-- Nombre del Proyecto -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Proyecto</label>
    <input type="number" formControlName="id_proyecto" 
           placeholder="Nombre del Centro Costo"
           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
  </div>

  <!-- Fila con Switch y Valor Venta -->
  <div class="grid grid-cols-2 gap-4">
    <!-- Afecta impuestos (Switch) -->
    <div>
<div>
  <label class="block text-sm font-medium text-gray-700 mb-1">Afecta impuestos?</label>
  <div class="flex items-center gap-3 px-3 py-2 h-[42px]">
    <label class="relative inline-flex items-center cursor-pointer">
      <input type="checkbox" formControlName="afect_impuestos" class="sr-only peer" />
      <div class="w-11 h-6 bg-gray-400 rounded-full peer peer-checked:bg-blue-600 transition-colors"></div>
      <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
    </label>
  </div>
</div>
</div>

    <!-- Valor Venta -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Valor Venta</label>
      <input type="text" formControlName="valor_venta" 
             placeholder="Valor de venta"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
    </div>
  </div>
</div>
    <div class="grid grid-cols-2 gap-4">
      <!--F.Emision-->  
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Emision</label>
        <input type="date" formControlName="fecha_emision" 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
       <div class="grid grid-cols-2 gap-4">
    <!--Servicio-->  
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Impuesto</label>
         <input type="text" formControlName="impuesto" 
               placeholder="Indique el servicio"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Total Documento</label>
         <input type="text" formControlName="total_documento" 
               placeholder="Indique el servicio"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 py-3 items-center mb-3 border-b  border-[#1A1A1A]/70">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Vencimiento</label>
        <input type="date" formControlName="fecha_vencimiento" 
               placeholder="Indique el nombre del cliente"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Observacion (Opcional)</label>
      <input  type="text" formControlName ="observacion"
                placeholder="Escribe la descripción del proyecto"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
     <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
          <select 
            formControlName="estado" 
            class="w-full px-3 py-2 border border-gray-300 rounded-lg 
                  focus:ring-2 focus:ring-gray-500 focus:border-gray-500 
                  bg-white text-gray-900 cursor-pointer">
            <option [value]="true"> Activo</option>
            <option [value]="false">Inactivo</option>
          </select>
        </div>
    <div class="flex justify-end gap-3 pt-4">
      <button type="button" (click)="cerrar()" 
              class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
        Cancelar
      </button>
      <button type="button" (click)="registrar()" 
              [disabled]="!ingresoForm.valid"
              class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300">
        Registrar
      </button>
    </div>
  </form>
</div>

<div class="border-muted/20 bg-background flex min-w-full flex-col rounded-xl border p-2">

  <div class="px-4 sm:px-6 py-3 space-y-3">
    <p class="text-xs text-muted-foreground">
      Movimientos/Proyectos
    </p>

    <h1 class="text-lg sm:text-2xl font-semibold text-foreground">
      Proyectos
    </h1>
  </div>
  <app-table-action (filtersChanged)="onFiltersChanged()"
   [selectedCount]="selectedCount()"
  (eliminarClick)="eliminarSeleccionados()"
  (proyectoRegistrado)="onProyectoRegistrado($event)"></app-table-action>
  <div class="scrollbar-thumb-rounded scrollbar-track-rounded scrollbar-thin scrollbar-track-transparent scrollbar-thumb-muted grow overflow-x-auto">
  <table class="w-full table-fixed border-collapse border-0 text-left align-middle leading-5 text-muted-foreground">
    <thead class="border-muted/20 text-muted-foreground border text-xs">
        <tr app-table-header 
      (onCheck)="toggleSelectAll($event)"  
      [allSelected]="allSelected()"
      [someSelected]="someSelected()">
  </tr>
    </thead>
    <tbody>
      @for (item of items(); track $index) {
  <tr class="hover:bg-card/50" app-table-row [item]="item"
   [isSelected]="isSelected(item.id_proyecto)"
              (checkboxChange)="onCheckboxChange(item.id_proyecto, $event)"></tr>
} @empty {
  <tr>
    <td class="py-4 text-center text-sm" colspan="8">No muestras encontradas</td>
  </tr>
}
    </tbody>
  </table>
</div>
  <app-table-footer
 [paginaActual]="paginas()"
  [totalPaginas]="totalpaginas()"
  [totalRegistros]="totalRegistros()"
  [tamanioPagina]="tamanioPagina()"
  (cambiarPagina)="onCambiarPagina($event)"
  (cambiarTamanio)="onCambiarTamanio($event)">
</app-table-footer>
</div>

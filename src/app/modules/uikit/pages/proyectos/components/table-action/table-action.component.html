<div class="color-primary-foreground px-6 py-8 border-b border-[#000]/70">
  <div class="flex items-center justify-between">
    <h3 class="text-sm text-foreground font-medium">Búsqueda general</h3>
  </div>

  <div class="color-primary-foreground px-6 py-5 border-b border-[#1A1A1A]/70">
    <input
      #searchInput
      name="search"
      class="pl-3 pr-2 py-2 w-full md:w-[400px] text-sm border border-foreground rounded-md bg-[#1A1A1A] text-gray-200 placeholder-gray-500"
      placeholder="Buscar correlativo"
      type="text"
      (input)="onSearchChange($event)" />
  </div>
</div>

<div class="color-primary-foreground px-5 py-3 border-b border-gray-700">
  <div class="flex items-center gap-3 flex-wrap md:flex-nowrap overflow-x-auto whitespace-nowrap">
     <!-- Fecha inicio -->
    <div class="flex flex-col">
      <label class="text-xs text-foreground mb-1">Desde</label>
      <input
        #fechaInicio
        type="date"
        class="px-2 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 w-full"
        (change)="onFechaInicioChange($event)" />
    </div>

    <!-- Fecha fin -->
    <div class="flex flex-col">
      <label class="text-xs text-foreground mb-1">Hasta</label>
      <input
        #fechaFin
        type="date"
        class="px-2 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 w-full"
        (change)="onFechaFinChange($event)" />
    </div>
    <!--Matricula-->
    <div class="flex flex-col">
      <label class="text-xs text-foreground mb-1">Matricula</label>
      <select
        #selectMatricula
        class="px-4 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 w-full"
        (change)="onMatriculaChange($event)">
        <option value="0">Seleccione una matricula</option>
        <option *ngFor="let e of embarcaciones" [value]="e.matricula">
          {{ e.matricula }}
        </option>
      </select>
    </div>


    <!-- Especie -->
    <div class="flex flex-col">
      <label class="text-xs text-foreground mb-1">Especie</label>
      <select
        #selectEspecie
        class="px-4 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 w-full"
        (change)="onEspecieChange($event)">
        <option value="0">Seleccione una especie</option>
        <option *ngFor="let e of especies" [value]="e.nombre_comun">
          {{ e.nombre_comun }}
        </option>
      </select>
    </div>

    <!-- Botón limpiar -->
    <div class="flex items-end justify-end">
      <button
        class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold"
        (click)="resetFilters(searchInput,selectMatricula, fechaInicio, fechaFin, selectEspecie)">
        Limpiar
      </button>
    </div>

  </div>
</div>

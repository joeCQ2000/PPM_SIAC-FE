<div class="color-primary-foreground rounded-lg overflow-hidden">

  <div class="px-6 py-4 border-b  border-[#1A1A1A]/70">
    <div class="flex items-center justify-between gap-3 mb-3">
      <h3 class="text-sm text-foreground font-medium">
        Búsqueda general (Número PER o Nro de Contrato)
      </h3>

      <button type="button"
              class="bg-[#2C32FF] text-primary-foreground rounded-md px-4 py-2.5 text-xs font-semibold hover:bg-blue-700 transition-colors"
              (click)="mostrarAvanzado = !mostrarAvanzado">
        {{ mostrarAvanzado ? 'OCULTAR' : 'BÚSQUEDA AVANZADA' }}
      </button>
    </div>

    <input #searchInput name="search"
           class="pl-3 pr-2 py-2 w-full md:w-[420px] text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
           placeholder="Buscar por PER o Nro de Contrato"
           type="text"
           (input)="onSearchChange($event)" />
  </div>

  <div *ngIf="mostrarAvanzado"
       class="px-5 py-4 border-t border-[#1A1A1A]/70">

    <div class="grid gap-3
                grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      <!-- ==== Desde ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Desde</label>
        <input #fechaInicio type="date"
               class="px-2 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
               (change)="onFechaInicioChange($event)" />
      </div>

      <!-- ==== Hasta ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Hasta</label>
        <input #fechaFin type="date"
               class="px-2 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
               (change)="onFechaFinChange($event)" />
      </div>

      <!-- ==== Nombre del Cliente ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Nombre del Cliente</label>
        <select #selectCliente
                class="px-3 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
                (change)="onMatriculaChange($event)">
          <option value="0">Seleccione una matrícula</option>
          <option *ngFor="let e of embarcaciones" [value]="e.matricula">
            {{ e.matricula }}
          </option>
        </select>
      </div>

      <!-- ==== Centro de Costo ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Centro de Costo</label>
        <select #selectCentroCosto
                class="px-3 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
                (change)="onMatriculaChange($event)">
          <option value="0">Seleccione un centro</option>
          <option *ngFor="let e of embarcaciones" [value]="e.matricula">
            {{ e.matricula }}
          </option>
        </select>
      </div>

      <!-- ==== Responsable ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Responsable</label>
        <select #selectResponsable
                class="px-3 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
                (change)="onMatriculaChange($event)">
          <option value="0">Seleccione un responsable</option>
          <option *ngFor="let e of embarcaciones" [value]="e.matricula">
            {{ e.matricula }}
          </option>
        </select>
      </div>

      <!-- ==== Estado ==== -->
      <div class="flex flex-col">
        <label class="text-xs text-foreground mb-1">Estado</label>
        <select #selectMatricula
                class="px-3 py-2 text-sm border border-gray-600 rounded-md bg-[#1A1A1A] text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-600/40 focus:border-blue-600/60"
                (change)="onMatriculaChange($event)">
          <option value="0">Seleccione una planta</option>
          <option *ngFor="let e of embarcaciones" [value]="e.matricula">
            {{ e.matricula }}
          </option>
        </select>
      </div>

      <!-- ==== BOTONES (segunda fila) ==== -->
      <div class="flex justify-end gap-3 col-span-full mt-2">
        <button type="button"
                class="bg-primary text-primary-foreground rounded-md px-6 py-2.5 text-xs font-semibold hover:bg-blue-700 transition-colors"
                (click)="resetFilters(searchInput, selectCliente,fechaFin,fechaInicio, selectMatricula)">
          BUSCAR
        </button>

        <button type="button"
                class="bg-gray-400 text-white rounded-md px-6 py-2.5 text-xs font-semibold hover:bg-gray-500 transition-colors"
                (click)="resetFilters(searchInput, selectCliente,fechaFin,fechaInicio, selectMatricula)">
          LIMPIAR FILTROS
        </button>
      </div>

    </div> 
  </div> <!-- /*ngIf mostrarAvanzado -->
 <!--Botones de la tabla -->
     <div class="flex justify-end px-6 py-4 gap-3 border-t border-[#1A1A1A]/70 py-3">
      <button 
    (click)="onEliminarClick()"
    [disabled]="selectedCount === 0"
    [class.opacity-50]="selectedCount === 0"
    [class.cursor-not-allowed]="selectedCount === 0"
    class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 
           flex items-center gap-2 transition-all duration-200
           disabled:hover:bg-red-600">
    Eliminar
    <!-- Badge -->
    <span 
      *ngIf="selectedCount > 0"
      class="px-2 py-0.5 bg-red-800 text-white text-xs font-bold rounded-full">
      {{ selectedCount }}
    </span>
  </button>


       <button (click)="abrirModalNuevo()" 
       class="bg-[#2C32FF] text-white rounded-md px-5 py-2.5 text-xs font-semibold hover:bg-[#2C32FF] transition-colors">
( + ) NUEVO
</button>
      </div>
</div>

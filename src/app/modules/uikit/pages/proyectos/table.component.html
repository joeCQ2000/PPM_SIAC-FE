<div class="mb-4 flex justify-between">
   
  <div class="inline-block space-x-4">
    <button 
    (click) = "goToRegistro()"
    class="bg-primary text-primary-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold">
      Añadir Muestreos
    </button>
     
  </div>
</div>


<div class="border-muted/20 bg-background flex min-w-full flex-col rounded-xl border p-2">
  <app-table-action (filtersChanged)="onFiltersChanged()"></app-table-action>
  <div class="scrollbar-thumb-rounded scrollbar-track-rounded scrollbar-thin scrollbar-track-transparent scrollbar-thumb-muted grow overflow-x-auto">
  <table
    class="w-full table-fixed border-collapse border-0 text-left align-middle leading-5 text-muted-foreground"
  >
    <thead class="border-muted/20 text-muted-foreground border text-xs">
      <tr app-table-header (onCheck)="toggleMuestreo($event)"></tr>
    </thead>
    <tbody>
      @for (item of items(); track $index) {
  <tr class="hover:bg-card/50" app-table-row [item]="item"></tr>
} @empty {
  <tr>
    <td class="py-4 text-center text-sm" colspan="8">No muestras encontradas</td>
  </tr>
}
    </tbody>
  </table>
</div>
  <app-table-footer
 [paginaActual]="paginas()"
  [totalPaginas]="totalpaginas()"
  [totalRegistros]="totalRegistros()"
  [tamanioPagina]="tamanioPagina()"
  (cambiarPagina)="onCambiarPagina($event)"
  (cambiarTamanio)="onCambiarTamanio($event)">
</app-table-footer>
</div>
